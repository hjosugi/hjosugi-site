name: pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache: true
      - name: Restore collected signal cache
        uses: actions/cache@v4
        with:
          path: data/items.json
          key: signal-items-${{ github.run_id }}
          restore-keys: |
            signal-items-
      - name: Collect public feeds
        run: go run ./cmd/refresh-feeds
        env:
          INITIAL_REFRESH: "false"
          ENABLE_LLM_SUMMARY: "false"
          ENABLE_EMBEDDINGS: "false"
          REQUEST_TIMEOUT: 20s
          FEED_WORKERS: "6"
          MAX_ITEMS: "1000"
      - id: pages
        uses: actions/configure-pages@v5
      - name: Export static site
        run: go run ./cmd/export-static -out public -base-url "${{ steps.pages.outputs.base_url }}"
      - uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
