name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Test static export
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          otp-version: "27.x"
          elixir-version: "1.18.x"
      - run: mix format --check-formatted
      - run: mix test
      - run: mix hub.export --out public
      - uses: actions/upload-artifact@v4
        with:
          name: public-site
          path: public
          retention-days: 7

  e2e:
    name: E2E responsive design check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          otp-version: "27.x"
          elixir-version: "1.18.x"
      - uses: actions/setup-node@v4
        with:
          node-version: "22.x"
      - run: mix hub.export --out public
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npx playwright test
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-screenshots
          path: |
            e2e/screenshots
            playwright-report
          retention-days: 7
